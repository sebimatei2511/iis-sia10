### REST Data HTTP service
# Portul pe care ruleaza microserviciul MongoDB
server.port=8094
# Prefixul pentru URL-urile serviciilor REST
server.servlet.context-path=/DSA-NoSQL-MongoDBService/rest

### MongoDB Data Source Configuration
# String-ul principal de conexiune pentru Spring Data MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/mds

# Proprietati custom (folosite in logica de business daca este cazul)
mongodb.data.source.DB_URL=mongodb://localhost:27017
mongodb.data.source.database=mds

### Logging Configuration
# Formatul log-urilor in consola
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
# Am eliminat Hibernate SQL si am adaugat log-uri pentru MongoDB
logging.level.org.springframework.data.mongodb=info

### SpringBoot Security
# Excludem configurarea automata de securitate pentru a evita ferestrele de login in browser
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Utilizator si parola pentru protectia de baza (daca este activata manual)
spring.security.user.name=developer
spring.security.user.password=iis